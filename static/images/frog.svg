<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Frog -->
  <circle cx="100" cy="120" r="50" fill="#33DA73"/>
  <!-- Head -->
  <circle cx="100" cy="80" r="45" fill="#33DA73"/>
  <!-- Eyes -->
  <circle cx="80" cy="60" r="12" fill="white"/>
  <circle cx="120" cy="60" r="12" fill="white"/>
  <circle cx="82" cy="60" r="8" fill="black"/>
  <circle cx="122" cy="60" r="8" fill="black"/>
  <!-- Mouth -->
  <path d="M 100 75 Q 90 85 85 80" stroke="black" stroke-width="2" fill="none"/>
  <path d="M 100 75 Q 110 85 115 80" stroke="black" stroke-width="2" fill="none"/>
  <!-- Legs -->
  <ellipse cx="60" cy="140" rx="25" ry="20" fill="#33DA73"/>
  <ellipse cx="140" cy="140" rx="25" ry="20" fill="#33DA73"/>
</svg>
