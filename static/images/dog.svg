<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dog -->
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="40" ry="50" fill="#8B6F47"/>
  <!-- Head -->
  <circle cx="100" cy="60" r="35" fill="#8B6F47"/>
  <!-- Ears -->
  <ellipse cx="70" cy="35" rx="15" ry="25" fill="#8B6F47"/>
  <ellipse cx="130" cy="35" rx="15" ry="25" fill="#8B6F47"/>
  <!-- Snout -->
  <ellipse cx="100" cy="75" rx="20" ry="15" fill="#A0826D"/>
  <!-- Nose -->
  <ellipse cx="100" cy="70" rx="8" ry="6" fill="black"/>
  <!-- Eyes -->
  <circle cx="85" cy="50" r="6" fill="white"/>
  <circle cx="115" cy="50" r="6" fill="white"/>
  <circle cx="86" cy="50" r="3" fill="black"/>
  <circle cx="116" cy="50" r="3" fill="black"/>
  <!-- Mouth -->
  <path d="M 100 75 L 100 85" stroke="black" stroke-width="1" fill="none"/>
  <path d="M 95 80 Q 100 85 105 80" stroke="black" stroke-width="1" fill="none"/>
  <!-- Tail -->
  <path d="M 140 120 Q 160 100 155 70" stroke="#8B6F47" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Front legs -->
  <rect x="85" y="150" width="10" height="35" fill="#8B6F47"/>
  <rect x="105" y="150" width="10" height="35" fill="#8B6F47"/>
  <!-- Back legs -->
  <rect x="75" y="155" width="10" height="30" fill="#8B6F47"/>
  <rect x="115" y="155" width="10" height="30" fill="#8B6F47"/>
</svg>
