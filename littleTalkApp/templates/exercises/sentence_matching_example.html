{% load django_vite %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Matching Exercise</title>
    {% vite_hmr_client %}
    {% vite_asset 'frontend/src/style.css' %}
</head>
<body class="exercise-page">
    <!-- Exercise mount point -->
    <div id="exercise-root" data-exercise-payload="{{ exercise_payload_json|escape }}"></div>

    <!-- React Fast Refresh for development -->
    {% vite_react_refresh %}
    
    <!-- Exercise entry point -->
    {% vite_asset 'frontend/src/exercises/sentence-matching-example.tsx' %}
</body>
</html>
