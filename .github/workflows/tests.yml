name: Django Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python manage.py test littleTalkApp.tests accounts -v 2 --settings=littleTalk.settings_test

      - name: Verify static collection
        run: |
          python manage.py collectstatic --noinput --settings=littleTalk.settings_test
